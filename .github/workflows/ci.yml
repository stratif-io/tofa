name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # fmt is platform-independent — run once on Linux (fast)
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check --all

  # Full workspace check on macOS (Tauri app needs AppKit)
  check-macos:
    name: Check (macOS)
    runs-on: macos-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2

      - name: clippy
        run: cargo clippy --workspace -- -D warnings

      - name: test
        run: cargo test --workspace

  # Supply-chain check: RUSTSEC advisories, licenses, bans, sources.
  # Config: deny.toml. Runs in parallel with the other checks.
  security:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  # CLI + core only on Linux (Tauri requires native GTK/WebKit unavailable here)
  check-linux:
    name: Check (Linux, CLI + core)
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: clippy
        run: cargo clippy -p tofa -p tofa-core -- -D warnings

      - name: test
        run: cargo test -p tofa -p tofa-core

  # ── install.sh smoke test ───────────────────────────────────────────────────
  install-test:
    name: Install & smoke test (${{ matrix.os }})
    # On PRs and pushes to main: build locally.
    # On release tags (v*): handled by release-install-test in release.yml.
    if: "!startsWith(github.ref_name, 'v')"
    runs-on: ${{ matrix.os }}
    needs: [check-linux, check-macos]
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: install-test-${{ matrix.os }}

      - name: Build CLI binary
        run: cargo build --release -p tofa

      - name: Install binary to ~/.local/bin
        run: |
          mkdir -p "$HOME/.local/bin"
          cp target/release/tofa "$HOME/.local/bin/tofa"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Smoke test
        run: |
          tofa --version
          tofa --help
          # list must fail — no vault yet
          if printf 'testpass\n' | tofa list; then
            echo "ERROR: tofa list should have failed before init" >&2
            exit 1
          fi
          VAULT_DIR="$(mktemp -d)"
          export TOFA_VAULT="$VAULT_DIR/vault"
          printf 'testpass\ntestpass\n' | tofa init
          printf 'testpass\n' | tofa add --name "Test" --secret "JBSWY3DPEHPK3PXP"
          printf 'testpass\n' | tofa list | grep -q "Test"
          echo "Smoke test passed."
