name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # fmt is platform-independent — run once on Linux (fast)
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check --all

  # Full workspace check on macOS (Tauri app needs AppKit)
  check-macos:
    name: Check (macOS)
    runs-on: macos-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2

      - name: clippy
        run: cargo clippy --workspace -- -D warnings

      - name: test
        run: cargo test --workspace

  # Supply-chain check: RUSTSEC advisories, licenses, bans, sources.
  # Config: deny.toml. Runs in parallel with the other checks.
  security:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  # CLI + core only on Linux (Tauri requires native GTK/WebKit unavailable here)
  check-linux:
    name: Check (Linux, CLI + core)
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: clippy
        run: cargo clippy -p tofa -p tofa-core -- -D warnings

      - name: test
        run: cargo test -p tofa -p tofa-core
