name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/book/**'
      - 'tofa/src/cli/**'
      - 'xtask/**'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'docs/book/**'
      - 'tofa/src/cli/**'
      - 'xtask/**'
      - '.github/workflows/docs.yml'

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # gen-docs builds the tofa CLI to dump its --help output, which means
      # the xcap-driven `tofa scan` is in the dep graph. Install the matching
      # system libs so the build doesn't fail on missing wayland/xcb.
      - name: Install xcap system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwayland-dev \
            libxcb1-dev libxcb-randr0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libdbus-1-dev

      - name: Verify reference is in sync
        run: cargo run -p xtask -- gen-docs --check

      - name: Install mdBook
        run: |
          MDBOOK_VERSION=0.4.40
          curl -sSL "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz -C /usr/local/bin

      - name: Build book
        run: mdbook build docs/book

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/book/dist

  deploy:
    name: Deploy to Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
