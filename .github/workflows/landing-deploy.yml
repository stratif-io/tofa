name: Landing · deploy

on:
  push:
    branches: [main]
    paths:
      - 'landing/**'
      - '.github/workflows/landing-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: landing-deploy
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/stratif-io/tofa-landing
  SSH_HOST: ns3150446.ip-51-83-100.eu
  SSH_USER: ubuntu

jobs:
  build-and-push:
    name: Build & push image
    runs-on: ubuntu-latest
    environment: OVH-PROD
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - id: meta
        run: echo "tag=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: ./landing
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE }}:latest
          build-args: |
            PUBLIC_UMAMI_WEBSITE_ID=${{ secrets.TOFA_UMAMI_WEBSITE_ID }}
          cache-from: type=gha,scope=landing
          cache-to: type=gha,mode=max,scope=landing

  deploy:
    name: Pull & run on OVH
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: OVH-PROD
    steps:
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.OVH_SSH_PRIVATE_KEY }}

      - name: Trust OVH host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${SSH_HOST}" >> ~/.ssh/known_hosts

      - name: Pull image and (re)run tofa-landing
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          ssh "${SSH_USER}@${SSH_HOST}" bash -s << REMOTE
          set -euo pipefail
          IMAGE="${IMAGE}:${IMAGE_TAG}"
          docker pull "\$IMAGE"
          docker rm -f tofa-landing 2>/dev/null || true
          docker run -d \\
            --name tofa-landing \\
            --network stratifio-net \\
            --restart unless-stopped \\
            "\$IMAGE"
          docker image prune -af
          REMOTE

      - name: Smoke-check container
        run: |
          ssh "${SSH_USER}@${SSH_HOST}" 'docker exec tofa-landing wget -q --spider http://127.0.0.1/index.html && echo "✓ tofa-landing is serving"'
