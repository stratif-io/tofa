name: Publish to crates.io

on:
  push:
    tags:
      - 'v[0-9]*'             # CLI release tags (publishes tofa-core + tofa)
      - 'tofa-core-v[0-9]*'   # release-please tag for tofa-core (publishes tofa-core only;
                              # the tofa step's curl skip-if-published check handles the CLI side)
  # Manual escape hatch: `gh workflow run publish-crates.yml --ref <tag>`
  # to retry a publish that didn't fire on tag push (e.g. tag predates this
  # workflow change, or the run was cancelled).
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish crates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # Publish in dependency order: core first, then CLI.
      # We deliberately do NOT pass --no-verify: cargo's build step against
      # the resolved dependency versions is exactly what catches API
      # mismatches between a path-dep's version constraint and what's
      # actually on crates.io.
      - name: Publish tofa-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          version=$(cargo metadata --no-deps --format-version=1 \
            | jq -r '.packages[] | select(.name == "tofa-core") | .version')
          echo "tofa-core local version: $version"
          if curl -sfI "https://crates.io/api/v1/crates/tofa-core/$version" >/dev/null; then
            echo "tofa-core $version already published, skipping"
          else
            cargo publish -p tofa-core
          fi

      - name: Wait for tofa-core to be indexed
        run: sleep 30

      - name: Publish tofa
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          version=$(cargo metadata --no-deps --format-version=1 \
            | jq -r '.packages[] | select(.name == "tofa") | .version')
          echo "tofa local version: $version"
          if curl -sfI "https://crates.io/api/v1/crates/tofa/$version" >/dev/null; then
            echo "tofa $version already published, skipping"
          else
            cargo publish -p tofa
          fi
