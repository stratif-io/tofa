name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          # Use a PAT (not GITHUB_TOKEN) so the tags release-please pushes
          # trigger downstream workflows like release.yml. The default
          # GITHUB_TOKEN deliberately does not trigger other workflows to
          # prevent recursion. Falls back to GITHUB_TOKEN when the PAT is
          # absent so first-time forks still produce release PRs (they just
          # won't auto-build artefacts on tag push).
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
