name: Release

on:
  push:
    tags:
      - 'v[0-9]*'          # CLI release:  v1.2.3
      - 'tofa-macos-v[0-9]*' # App release: tofa-macos-v1.2.3
  # Manual escape hatch: dispatch on an existing tag to re-run the build,
  # e.g. `gh workflow run release.yml --ref tofa-macos-v0.4.0`. github.ref_name
  # is set from the chosen ref, so the per-job startsWith() conditions still
  # route CLI vs macOS-app builds correctly.
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── CLI binaries ────────────────────────────────────────────────────────────
  build-cli:
    name: Build CLI (${{ matrix.target }})
    if: startsWith(github.ref_name, 'v')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: x86_64-apple-darwin
            use_cross: false
          - os: macos-latest
            target: aarch64-apple-darwin
            use_cross: false
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            use_cross: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            use_cross: true
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Install binutils (aarch64 Linux)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: sudo apt-get install -y binutils-aarch64-linux-gnu

      - name: Build
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p tofa
          else
            cargo build --release --target ${{ matrix.target }} -p tofa
          fi
          case "${{ matrix.target }}" in
            aarch64-*-linux-*)
              aarch64-linux-gnu-strip target/${{ matrix.target }}/release/tofa 2>/dev/null || true ;;
            *)
              strip target/${{ matrix.target }}/release/tofa 2>/dev/null || true ;;
          esac

      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE="tofa-${VERSION}-${{ matrix.target }}.tar.gz"
          cp target/${{ matrix.target }}/release/tofa tofa
          tar czf "$ARCHIVE" tofa
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}
          path: ${{ env.ARCHIVE }}

  # ── macOS app (universal DMG) ───────────────────────────────────────────────
  build-app:
    name: Build macOS App
    if: startsWith(github.ref_name, 'tofa-macos-v') || startsWith(github.ref_name, 'v')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          key: tauri-universal

      - name: Cache Tauri CLI
        id: cache-tauri-cli
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-tauri
          key: tauri-cli-${{ runner.os }}-v2

      - name: Install Tauri CLI
        if: steps.cache-tauri-cli.outputs.cache-hit != 'true'
        run: cargo install tauri-cli --version "^2" --locked

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Verify Tauri signing secrets are present
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY secret is not set"
            exit 1
          fi
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY_PASSWORD secret is not set"
            exit 1
          fi

      - name: Build universal app (app + updater)
        working-directory: tofa-app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: cargo tauri build --target universal-apple-darwin --bundles app

      - name: Create custom DMG
        run: |
          VERSION="${GITHUB_REF_NAME#tofa-macos-v}"
          VERSION="${VERSION#v}"
          APP=$(find target/universal-apple-darwin/release/bundle/macos -name "*.app" | head -1)
          DMG_FILE="tofa-app-${VERSION}.dmg"
          # Window matches the PNG (1320x800). Finder enlarges the window to
          # fit the background when the PNG exceeds --window-size, ignoring
          # the configured icon coordinates relative to the smaller window.
          # Icon centres land in the platforms drawn at PNG (320,420) and
          # (1000,420). Icon size 160 keeps icons proportional in the wider
          # canvas while still fitting inside the 260x320 platforms.
          create-dmg \
            --volname "Tofa" \
            --background "tofa-app/packaging/dmg-background.png" \
            --window-size 1320 800 \
            --icon-size 160 \
            --icon "Tofa.app" 320 420 \
            --app-drop-link 1000 420 \
            --hide-extension "Tofa.app" \
            --no-internet-enable \
            "$DMG_FILE" \
            "$APP"
          echo "DMG_FILE=$DMG_FILE" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: app-dmg
          path: ${{ env.DMG_FILE }}

      - name: Upload updater artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-updater
          path: |
            target/universal-apple-darwin/release/bundle/macos/Tofa.app.tar.gz
            target/universal-apple-darwin/release/bundle/macos/Tofa.app.tar.gz.sig
            target/universal-apple-darwin/release/bundle/macos/latest.json
          if-no-files-found: error

  # ── GitHub Release ──────────────────────────────────────────────────────────
  release:
    name: Publish Release
    needs: [build-cli, build-app]
    if: always() && (needs.build-cli.result == 'success' || needs.build-cli.result == 'skipped') && needs.build-app.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Compute SHA256SUMS
        run: |
          cd artifacts
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*
          generate_release_notes: true
          prerelease: ${{ !startsWith(github.ref_name, 'tofa-macos-v') }}

      - name: Dispatch Homebrew CLI formula update
        if: startsWith(github.ref_name, 'v')
        env:
          TAP_TOKEN: ${{ secrets.TAP_DISPATCH_TOKEN }}
        run: |
          [ -z "$TAP_TOKEN" ] && echo "TAP_DISPATCH_TOKEN not set, skipping" && exit 0
          VERSION="${GITHUB_REF_NAME#v}"
          SHA_MAC_ARM=$(grep "aarch64-apple-darwin" artifacts/SHA256SUMS | awk '{print $1}')
          SHA_MAC_X86=$(grep "x86_64-apple-darwin" artifacts/SHA256SUMS | awk '{print $1}')
          SHA_LINUX_ARM=$(grep "aarch64-unknown-linux-musl" artifacts/SHA256SUMS | awk '{print $1}')
          SHA_LINUX_X86=$(grep "x86_64-unknown-linux-musl" artifacts/SHA256SUMS | awk '{print $1}')
          curl -s -X POST \
            -H "Authorization: Bearer $TAP_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/stratif-io/homebrew-tofa/dispatches \
            -d "{
              \"event_type\": \"new-cli-release\",
              \"client_payload\": {
                \"version\": \"$VERSION\",
                \"sha_mac_arm\": \"$SHA_MAC_ARM\",
                \"sha_mac_x86\": \"$SHA_MAC_X86\",
                \"sha_linux_arm\": \"$SHA_LINUX_ARM\",
                \"sha_linux_x86\": \"$SHA_LINUX_X86\"
              }
            }"

      - name: Dispatch Homebrew app cask update
        if: startsWith(github.ref_name, 'tofa-macos-v')
        env:
          TAP_TOKEN: ${{ secrets.TAP_DISPATCH_TOKEN }}
        run: |
          [ -z "$TAP_TOKEN" ] && echo "TAP_DISPATCH_TOKEN not set, skipping" && exit 0
          VERSION="${GITHUB_REF_NAME#tofa-macos-v}"
          SHA_DMG=$(grep "\.dmg" artifacts/SHA256SUMS | awk '{print $1}')
          curl -s -X POST \
            -H "Authorization: Bearer $TAP_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/stratif-io/homebrew-tofa/dispatches \
            -d "{
              \"event_type\": \"new-app-release\",
              \"client_payload\": {
                \"version\": \"$VERSION\",
                \"sha_dmg\": \"$SHA_DMG\"
              }
            }"
