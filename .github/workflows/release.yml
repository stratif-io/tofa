name: Release

on:
  push:
    tags:
      - 'v[0-9]*'          # CLI release:  v1.2.3
      - 'tofa-app-v[0-9]*' # App release:  tofa-app-v1.2.3

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── CLI binaries ────────────────────────────────────────────────────────────
  build-cli:
    name: Build CLI (${{ matrix.target }})
    if: startsWith(github.ref_name, 'v')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: x86_64-apple-darwin
            use_cross: false
          - os: macos-latest
            target: aarch64-apple-darwin
            use_cross: false
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            use_cross: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            use_cross: true
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Install binutils (aarch64 Linux)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: sudo apt-get install -y binutils-aarch64-linux-gnu

      - name: Build
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p tofa
          else
            cargo build --release --target ${{ matrix.target }} -p tofa
          fi
          case "${{ matrix.target }}" in
            aarch64-*-linux-*)
              aarch64-linux-gnu-strip target/${{ matrix.target }}/release/tofa 2>/dev/null || true ;;
            *)
              strip target/${{ matrix.target }}/release/tofa 2>/dev/null || true ;;
          esac

      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE="tofa-${VERSION}-${{ matrix.target }}.tar.gz"
          cp target/${{ matrix.target }}/release/tofa tofa
          tar czf "$ARCHIVE" tofa
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}
          path: ${{ env.ARCHIVE }}

  # ── macOS app (universal DMG) ───────────────────────────────────────────────
  build-app:
    name: Build macOS App
    if: startsWith(github.ref_name, 'tofa-app-v') || startsWith(github.ref_name, 'v')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          key: tauri-universal

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build universal app
        working-directory: tofa-app
        run: cargo tauri build --target universal-apple-darwin

      - name: Rename DMG
        run: |
          VERSION="${GITHUB_REF_NAME#tofa-app-v}"
          VERSION="${VERSION#v}"
          DMG=$(find target/universal-apple-darwin/release/bundle/dmg -name "*.dmg" | head -1)
          mv "$DMG" "tofa-app-${VERSION}.dmg"
          echo "DMG_FILE=tofa-app-${VERSION}.dmg" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: app-dmg
          path: ${{ env.DMG_FILE }}

  # ── GitHub Release ──────────────────────────────────────────────────────────
  release:
    name: Publish Release
    needs: [build-cli, build-app]
    if: always() && (needs.build-cli.result == 'success' || needs.build-cli.result == 'skipped') && needs.build-app.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Compute SHA256SUMS
        run: |
          cd artifacts
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*
          generate_release_notes: true

      - name: Dispatch Homebrew tap update
        if: startsWith(github.ref_name, 'v')
        env:
          TAP_TOKEN: ${{ secrets.TAP_DISPATCH_TOKEN }}
        run: |
          [ -z "$TAP_TOKEN" ] && echo "TAP_DISPATCH_TOKEN not set, skipping" && exit 0
          VERSION="${GITHUB_REF_NAME#v}"
          SHA_MAC_ARM=$(grep "aarch64-apple-darwin" artifacts/SHA256SUMS | awk '{print $1}')
          SHA_MAC_X86=$(grep "x86_64-apple-darwin" artifacts/SHA256SUMS | awk '{print $1}')
          SHA_LINUX_ARM=$(grep "aarch64-unknown-linux-musl" artifacts/SHA256SUMS | awk '{print $1}')
          SHA_LINUX_X86=$(grep "x86_64-unknown-linux-musl" artifacts/SHA256SUMS | awk '{print $1}')
          curl -s -X POST \
            -H "Authorization: Bearer $TAP_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/cabichahine/homebrew-tofa/dispatches \
            -d "{
              \"event_type\": \"new-release\",
              \"client_payload\": {
                \"version\": \"$VERSION\",
                \"sha_mac_arm\": \"$SHA_MAC_ARM\",
                \"sha_mac_x86\": \"$SHA_MAC_X86\",
                \"sha_linux_arm\": \"$SHA_LINUX_ARM\",
                \"sha_linux_x86\": \"$SHA_LINUX_X86\"
              }
            }"
