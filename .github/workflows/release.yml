name: Release

on:
  push:
    tags:
      - 'v[0-9]*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: x86_64-apple-darwin
            use_cross: false
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            use_cross: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            use_cross: true
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Install binutils for cross-compilation
        if: matrix.use_cross
        run: sudo apt-get install -y binutils-aarch64-linux-gnu

      - name: Build
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p tofa
          else
            cargo build --release --target ${{ matrix.target }} -p tofa
          fi
          case "${{ matrix.target }}" in
            aarch64-*-linux-*)
              aarch64-linux-gnu-strip target/${{ matrix.target }}/release/tofa 2>/dev/null || \
                strip target/${{ matrix.target }}/release/tofa 2>/dev/null || true ;;
            *)
              strip target/${{ matrix.target }}/release/tofa 2>/dev/null || true ;;
          esac

      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE="tofa-${VERSION}-${{ matrix.target }}.tar.gz"
          cp target/${{ matrix.target }}/release/tofa tofa
          tar czf "$ARCHIVE" tofa
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: tofa-${{ matrix.target }}
          path: ${{ env.ARCHIVE }}

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Compute SHA256SUMS
        run: |
          cd artifacts
          sha256sum *.tar.gz > SHA256SUMS
          cat SHA256SUMS

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.tar.gz
            artifacts/SHA256SUMS
          generate_release_notes: true

      - name: Dispatch tap update
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA_MAC_X86=$(grep "x86_64-apple-darwin" artifacts/SHA256SUMS | awk '{print $1}')
          SHA_LINUX_ARM=$(grep "aarch64-unknown-linux-musl" artifacts/SHA256SUMS | awk '{print $1}')
          SHA_LINUX_X86=$(grep "x86_64-unknown-linux-musl" artifacts/SHA256SUMS | awk '{print $1}')
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.TAP_DISPATCH_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/cabichahine/homebrew-tofa/dispatches \
            -d "{
              \"event_type\": \"new-release\",
              \"client_payload\": {
                \"version\": \"$VERSION\",
                \"sha_mac_x86\": \"$SHA_MAC_X86\",
                \"sha_linux_arm\": \"$SHA_LINUX_ARM\",
                \"sha_linux_x86\": \"$SHA_LINUX_X86\"
              }
            }"
