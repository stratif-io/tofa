name: Update Formula / Cask

on:
  repository_dispatch:
    types: [new-cli-release, new-app-release]

permissions:
  contents: write

jobs:
  update-formula:
    name: Update CLI formula
    if: github.event.action == 'new-cli-release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Patch Formula/tofa.rb
        env:
          VERSION: ${{ github.event.client_payload.version }}
          SHA_MAC_ARM: ${{ github.event.client_payload.sha_mac_arm }}
          SHA_MAC_X86: ${{ github.event.client_payload.sha_mac_x86 }}
          SHA_LINUX_ARM: ${{ github.event.client_payload.sha_linux_arm }}
          SHA_LINUX_X86: ${{ github.event.client_payload.sha_linux_x86 }}
        run: |
          FILE="Formula/tofa.rb"
          # Version
          sed -i "s/version \".*\"/version \"$VERSION\"/" "$FILE"
          # SHAs — order matches on_macos/arm, on_macos/intel, on_linux/arm, on_linux/intel
          SHAS=("$SHA_MAC_ARM" "$SHA_MAC_X86" "$SHA_LINUX_ARM" "$SHA_LINUX_X86")
          i=0
          while IFS= read -r line; do
            if [[ "$line" =~ sha256 ]]; then
              echo "      sha256 \"${SHAS[$i]}\""
              (( i++ )) || true
            else
              echo "$line"
            fi
          done < "$FILE" > "$FILE.tmp" && mv "$FILE.tmp" "$FILE"

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/tofa.rb
          git commit -m "chore: update tofa formula to v${{ github.event.client_payload.version }}"
          git push

  update-cask:
    name: Update app cask
    if: github.event.action == 'new-app-release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Patch Casks/tofa.rb
        env:
          VERSION: ${{ github.event.client_payload.version }}
          SHA_DMG: ${{ github.event.client_payload.sha_dmg }}
        run: |
          FILE="Casks/tofa.rb"
          sed -i "s/version \".*\"/version \"$VERSION\"/" "$FILE"
          sed -i "s/sha256 \".*\"/sha256 \"$SHA_DMG\"/" "$FILE"

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/tofa.rb
          git commit -m "chore: update tofa cask to v${{ github.event.client_payload.version }}"
          git push
