server {
  listen 80 default_server;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  charset utf-8;

  # Stripped headers — the outer Caddy already sets HSTS, X-Content-Type-Options, etc.
  server_tokens off;

  # Compression
  gzip on;
  gzip_vary on;
  gzip_comp_level 6;
  gzip_min_length 256;
  gzip_types
    text/css
    text/plain
    text/xml
    application/javascript
    application/json
    application/xml
    image/svg+xml
    image/x-icon;

  # Hashed Astro assets — long cache, immutable
  location /_astro/ {
    expires 1y;
    add_header Cache-Control "public, immutable" always;
    access_log off;
  }

  # Other static binaries
  location ~* \.(svg|png|webp|avif|woff2|ico)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000" always;
    access_log off;
  }

  # Demo videos — byte-range streaming
  location ~* \.mp4$ {
    add_header Accept-Ranges bytes always;
    access_log off;
  }

  # Sitemap, robots
  location ~* \.(xml|txt)$ {
    add_header Cache-Control "public, max-age=3600" always;
  }

  # HTML — short TTL so re-deploys are picked up quickly
  location ~* \.html$ {
    add_header Cache-Control "public, max-age=3600" always;
  }

  # Astro emits routes as <route>/index.html (directory format)
  location / {
    try_files $uri $uri/index.html =404;
  }

  error_page 404 /404.html;
}
