<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="1320" height="800"
     viewBox="0 0 1320 800">

  <defs>
    <radialGradient id="bg" cx="660" cy="400" r="700" gradientUnits="userSpaceOnUse">
      <stop offset="0"   stop-color="#1E1538"/>
      <stop offset="1"   stop-color="#08080C"/>
    </radialGradient>
    <radialGradient id="halo" cx="660" cy="400" r="500" gradientUnits="userSpaceOnUse">
      <stop offset="0"   stop-color="#7C5CFF" stop-opacity="0.35"/>
      <stop offset="0.6" stop-color="#7C5CFF" stop-opacity="0.10"/>
      <stop offset="1"   stop-color="#7C5CFF" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dotgrid" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="1" fill="#FFFFFF" fill-opacity="0.03"/>
    </pattern>
    <filter id="violet-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12" result="blur"/>
      <feFlood flood-color="#7C5CFF" flood-opacity="0.6"/>
      <feComposite in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- LAYER: background gradient -->
  <rect width="1320" height="800" fill="url(#bg)"/>

  <!-- LAYER: halo -->
  <ellipse cx="660" cy="400" rx="600" ry="320" fill="url(#halo)"/>

  <!-- LAYER: dot grid -->
  <rect width="1320" height="800" fill="url(#dotgrid)"/>

  <!-- LAYER: OTP digit motif -->
  <g font-family="Menlo, monospace" font-size="44" fill="#7C5CFF" fill-opacity="0.06" text-anchor="middle">
    <g transform="translate(580, 130)">
      <text x="0" y="0">3</text>
      <text x="0" y="56">4</text>
      <text x="0" y="112">5</text>
      <text x="0" y="168">6</text>
    </g>
    <g transform="translate(660, 102)">
      <text x="0" y="0">7</text>
      <text x="0" y="56">8</text>
      <text x="0" y="112">9</text>
      <text x="0" y="168">0</text>
    </g>
    <g transform="translate(740, 158)">
      <text x="0" y="0">1</text>
      <text x="0" y="56">2</text>
      <text x="0" y="112">3</text>
      <text x="0" y="168">4</text>
    </g>
  </g>

  <!-- LAYER: wordmark -->
  <text x="660" y="180"
        font-family="Helvetica Neue, Helvetica, sans-serif"
        font-size="120"
        font-weight="600"
        fill="#FFFFFF"
        text-anchor="middle"
        letter-spacing="-2"
        filter="url(#violet-glow)">tofa</text>
</svg>
