<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About Tofa</title>
  <link rel="stylesheet" href="assets/css/tokens.css">
  <link rel="stylesheet" href="assets/css/styles.css">
  <link rel="stylesheet" href="assets/css/app.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body { height: 100%; margin: 0; }

    body {
      display: grid;
      place-items: center;
      padding: var(--s-5);
      font-family: var(--font-body);
      color: var(--text);
      background: var(--bg);
      user-select: none;
      -webkit-user-select: none;
      overflow: hidden;
    }

    .about {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--s-4);
      width: 100%;
      max-width: 280px;
      text-align: center;
    }

    .about__icon {
      width: 72px;
      height: 72px;
      display: block;
      color: var(--brand);
    }

    .about__title {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 700;
      line-height: 1;
      margin: 0;
      letter-spacing: -0.01em;
    }

    .about__versions {
      display: grid;
      grid-template-columns: auto auto;
      column-gap: var(--s-3);
      row-gap: var(--s-1);
      font-size: 12px;
      color: var(--text-muted);
    }
    .about__versions dt { margin: 0; text-align: right; }
    .about__versions dd {
      margin: 0;
      text-align: left;
      font-family: var(--font-mono);
      color: var(--text);
      font-feature-settings: "tnum";
    }

    .about__status {
      font-size: 13px;
      line-height: 1.4;
      min-height: 1.4em;
      color: var(--text-muted);
      transition: color 200ms var(--ease-out);
    }
    .about__status--success { color: var(--success); }
    .about__status--error   { color: var(--danger); }

    .about__actions {
      display: flex;
      flex-direction: column;
      gap: var(--s-2);
      width: 100%;
    }

    .about__btn {
      appearance: none;
      -webkit-appearance: none;
      width: 100%;
      min-height: 36px;
      padding: var(--s-2) var(--s-4);
      border-radius: var(--r-md);
      border: 1px solid transparent;
      background: var(--surface-2);
      color: var(--text);
      font: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 150ms var(--ease-out),
                  border-color 150ms var(--ease-out),
                  transform 80ms var(--ease-out);
    }
    .about__btn:hover:not(:disabled) { background: var(--surface); border-color: var(--border-strong); }
    .about__btn:active:not(:disabled) { transform: scale(0.98); }
    .about__btn:focus-visible {
      outline: 2px solid var(--brand);
      outline-offset: 2px;
    }
    .about__btn:disabled { opacity: 0.5; cursor: default; }

    .about__btn--primary {
      background: var(--brand);
      color: var(--on-brand);
      border-color: var(--brand);
    }
    .about__btn--primary:hover:not(:disabled) {
      background: var(--brand-hover);
      border-color: var(--brand-hover);
    }

    .about__btn[hidden] { display: none; }

    @media (prefers-reduced-motion: reduce) {
      .about__btn,
      .about__status { transition: none; }
      .about__btn:active:not(:disabled) { transform: none; }
    }
  </style>
</head>
<body>
  <main class="about" aria-labelledby="about-title">
    <svg class="about__icon" viewBox="0 0 128 128" aria-hidden="true">
      <path d="M 64 14 C 78 14 92 18 102 22 C 104 23 106 25 106 28 V 60 C 106 86 90 104 66 114 C 65 114 63 114 62 114 C 38 104 22 86 22 60 V 28 C 22 25 24 23 26 22 C 36 18 50 14 64 14 Z" fill="currentColor"/>
      <rect x="40" y="46" width="18" height="18" rx="3" fill="var(--bg)"/>
      <path d="M 76 50 Q 84 46 90 56" stroke="var(--bg)" stroke-width="4" stroke-linecap="round" fill="none"/>
      <path d="M 44 76 Q 64 96 84 76" stroke="var(--bg)" stroke-width="4" stroke-linecap="round" fill="none"/>
    </svg>
    <h1 id="about-title" class="about__title">Tofa</h1>

    <dl class="about__versions" aria-label="Version information">
      <dt>App</dt><dd id="app-version">…</dd>
      <dt>Core</dt><dd id="core-version">…</dd>
    </dl>

    <p id="status" class="about__status" role="status" aria-live="polite"></p>

    <div class="about__actions">
      <button id="btn-check" class="about__btn about__btn--primary" type="button">Check for updates</button>
      <button id="btn-download" class="about__btn" type="button" hidden>Download</button>
    </div>
  </main>

  <script>
    const { invoke } = window.__TAURI__.core;

    const el = (id) => document.getElementById(id);
    const statusEl = el('status');
    const btnCheck = el('btn-check');
    const btnDownload = el('btn-download');
    let downloadUrl = null;

    function setStatus(text, kind) {
      statusEl.textContent = text || '';
      statusEl.className = 'about__status' + (kind ? ' about__status--' + kind : '');
    }

    function applyResult(r) {
      if (!r) return;
      if (r.error) {
        setStatus(r.error, 'error');
        btnDownload.hidden = true;
        downloadUrl = null;
        return;
      }
      if (r.update_available && r.latest && r.release_url) {
        setStatus('Update available: v' + r.latest, 'success');
        downloadUrl = r.release_url;
        btnDownload.textContent = 'Download v' + r.latest;
        btnDownload.hidden = false;
      } else {
        setStatus("You're up to date.", '');
        btnDownload.hidden = true;
        downloadUrl = null;
      }
    }

    (async () => {
      try {
        const v = await invoke('get_versions');
        el('app-version').textContent = v.app;
        el('core-version').textContent = v.core;
      } catch (e) {
        el('app-version').textContent = '?';
        el('core-version').textContent = '?';
      }
      try {
        const cached = await invoke('get_cached_update_status');
        if (cached) applyResult(cached);
      } catch (_) {}
    })();

    btnCheck.addEventListener('click', async () => {
      btnCheck.disabled = true;
      setStatus('Checking…');
      try {
        const r = await invoke('check_for_updates');
        applyResult(r);
      } catch (e) {
        setStatus(String(e), 'error');
      } finally {
        btnCheck.disabled = false;
      }
    });

    btnDownload.addEventListener('click', async () => {
      if (!downloadUrl) return;
      try {
        await invoke('open_release_url', { url: downloadUrl });
      } catch (e) {
        setStatus(String(e), 'error');
      }
    });
  </script>
</body>
</html>
