<svg xmlns="http://www.w3.org/2000/svg" width="0" height="0" style="display:none" aria-hidden="true">
  <defs>

    <!--
      tofa-wink
      Full Sir Wink logo: shield body in currentColor,
      face details (QR eye square, wink arc, smile arc) in var(--bg).
      Designed for inline use where CSS variables resolve.
      viewBox: 0 0 128 128
    -->
    <symbol id="tofa-wink" viewBox="0 0 128 128">
      <path d="M 64 14 C 78 14 92 18 102 22 C 104 23 106 25 106 28 V 60 C 106 86 90 104 66 114 C 65 114 63 114 62 114 C 38 104 22 86 22 60 V 28 C 22 25 24 23 26 22 C 36 18 50 14 64 14 Z" fill="currentColor"/>
      <!-- QR-code eye (left) -->
      <rect x="40" y="46" width="18" height="18" rx="3" fill="var(--bg)"/>
      <rect x="46" y="52" width="6"  height="6"  rx="1" fill="currentColor"/>
      <!-- wink (right) -->
      <path d="M 70 56 Q 79 50 88 56" stroke="var(--bg)" stroke-width="4" fill="none" stroke-linecap="round"/>
      <!-- smile -->
      <path d="M 48 82 Q 64 94 80 82" stroke="var(--bg)" stroke-width="4" fill="none" stroke-linecap="round"/>
    </symbol>

    <!--
      tofa-open
      Both eyes open — used when the vault is unlocked.
      Same shield as tofa-wink but right eye is a QR square instead of a wink arc.
    -->
    <symbol id="tofa-open" viewBox="0 0 128 128">
      <path d="M 64 14 C 78 14 92 18 102 22 C 104 23 106 25 106 28 V 60 C 106 86 90 104 66 114 C 65 114 63 114 62 114 C 38 104 22 86 22 60 V 28 C 22 25 24 23 26 22 C 36 18 50 14 64 14 Z" fill="currentColor"/>
      <!-- QR-code eye (left) -->
      <rect x="40" y="46" width="18" height="18" rx="3" fill="var(--bg)"/>
      <rect x="46" y="52" width="6"  height="6"  rx="1" fill="currentColor"/>
      <!-- QR-code eye (right) -->
      <rect x="70" y="46" width="18" height="18" rx="3" fill="var(--bg)"/>
      <rect x="76" y="52" width="6"  height="6"  rx="1" fill="currentColor"/>
      <!-- smile -->
      <path d="M 48 82 Q 64 94 80 82" stroke="var(--bg)" stroke-width="4" fill="none" stroke-linecap="round"/>
    </symbol>

    <!--
      tofa-wink-mono
      Silhouette only — shield shape in currentColor, no face details.
      Use when a simple one-color mark is needed.
    -->
    <symbol id="tofa-wink-mono" viewBox="0 0 128 128">
      <path d="M 64 14 C 78 14 92 18 102 22 C 104 23 106 25 106 28 V 60 C 106 86 90 104 66 114 C 65 114 63 114 62 114 C 38 104 22 86 22 60 V 28 C 22 25 24 23 26 22 C 36 18 50 14 64 14 Z" fill="currentColor"/>
    </symbol>


  </defs>
</svg>
