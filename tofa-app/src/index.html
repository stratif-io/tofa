<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TOFA</title>
  <link rel="stylesheet" href="assets/css/tokens.css">
  <link rel="stylesheet" href="assets/css/styles.css">
  <link rel="stylesheet" href="assets/css/app.css">
</head>
<body>

<!-- Sir Wink SVG sprite — inline for CSS variable support -->
<div style="position:absolute;width:0;height:0;overflow:hidden" aria-hidden="true">
  <svg width="0" height="0">
    <defs>
      <symbol id="tofa-wink" viewBox="0 0 128 128">
        <path d="M 64 14 C 78 14 92 18 102 22 C 104 23 106 25 106 28 V 60 C 106 86 90 104 66 114 C 65 114 63 114 62 114 C 38 104 22 86 22 60 V 28 C 22 25 24 23 26 22 C 36 18 50 14 64 14 Z" fill="currentColor"/>
        <rect x="40" y="46" width="18" height="18" rx="3" fill="var(--bg)"/>
        <rect x="46" y="52" width="6" height="6" rx="1" fill="currentColor"/>
        <path d="M 70 56 Q 79 50 88 56" stroke="var(--bg)" stroke-width="4" fill="none" stroke-linecap="round"/>
        <path d="M 48 82 Q 64 94 80 82" stroke="var(--bg)" stroke-width="4" fill="none" stroke-linecap="round"/>
      </symbol>
    </defs>
  </svg>
</div>

<!-- Loader bar -->
<div id="loader-bar"><div id="loader-bar-inner"></div></div>

<!-- Toast -->
<div id="toast" class="toast" role="alert" aria-live="polite"></div>

<!-- ====== VIEW: LOCKED ====== -->
<div id="view-locked" class="view active">
  <div class="app-header tray-header">
    <svg width="22" height="22" style="color: var(--brand)"><use href="#tofa-wink"/></svg>
    <span class="tray-header-title">TOFA</span>
  </div>
  <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:var(--s-6);">
    <svg width="80" height="80" style="color:var(--brand);margin-bottom:var(--s-4)"><use href="#tofa-wink"/></svg>
    <p style="font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:0.2em;color:var(--text-muted);margin-bottom:var(--s-5);">VAULT LOCKED</p>
    <form id="form-unlock" style="width:100%;max-width:280px;margin:0 auto;">
      <label class="input-label" for="input-passphrase">Passphrase</label>
      <input id="input-passphrase" class="input" type="password" autocomplete="current-password" autofocus style="margin-bottom:var(--s-3);">
      <div id="confirm-wrap" style="display:none;margin-bottom:var(--s-3);">
        <label class="input-label" for="input-passphrase-confirm">Confirm passphrase</label>
        <input id="input-passphrase-confirm" class="input" type="password" autocomplete="new-password">
        <p style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);margin-top:var(--s-1);">Remember it — it cannot be recovered.</p>
      </div>
      <p id="unlock-error" style="font-family:var(--font-mono);font-size:11px;color:var(--danger);margin-bottom:var(--s-2);display:none;" role="alert"></p>
      <button type="submit" class="btn btn-primary" style="width:100%;" id="btn-unlock-submit">Unlock</button>
    </form>
  </div>
</div>

<!-- ====== VIEW: LIST ====== -->
<div id="view-list" class="view">
  <div class="app-header tray-header">
    <svg width="22" height="22" style="color: var(--brand)"><use href="#tofa-wink"/></svg>
    <span class="tray-header-title">TOFA</span>
    <span id="list-badge" class="badge badge-brand" style="margin-left:auto;"></span>
    <button id="btn-add" class="btn btn-ghost" style="padding:4px 8px;font-size:18px;line-height:1;" title="Add account (⌘N)">+</button>
    <button id="btn-lock" class="btn btn-ghost" style="padding:4px 8px;" title="Lock vault">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 018 0v4"/>
      </svg>
    </button>
  </div>
  <div style="padding:var(--s-2) var(--s-3) 0;">
    <input id="search-input" class="input" placeholder="Search accounts… ⌘K" style="font-size:12px;padding:7px 12px;">
  </div>
  <div class="otp-progress" style="margin:var(--s-2) var(--s-3) 0;">
    <div class="otp-progress-bar" id="global-progress-bar"></div>
  </div>
  <div class="account-list" id="account-list"></div>
</div>

<!-- ====== VIEW: DETAIL ====== -->
<div id="view-detail" class="view">
  <div class="app-header tray-header">
    <button id="btn-detail-back" class="btn btn-ghost" style="padding:4px 8px;">←</button>
    <span id="detail-title" class="tray-header-title"></span>
  </div>
  <div style="flex:1;padding:var(--s-4);display:flex;flex-direction:column;align-items:center;">
    <div id="detail-icon" class="account-icon" style="width:52px;height:52px;font-size:22px;margin-bottom:var(--s-3);"></div>
    <div style="font-family:var(--font-mono);font-size:11px;color:var(--text-muted);margin-bottom:var(--s-1);" id="detail-account"></div>
    <div class="detail-code" id="detail-code"></div>
    <div style="text-align:right;width:100%;font-family:var(--font-mono);font-size:10px;color:var(--text-muted);padding:var(--s-1) 0;" id="detail-seconds"></div>
    <div class="otp-progress" style="width:100%;margin-bottom:var(--s-5);">
      <div class="otp-progress-bar" id="detail-progress-bar"></div>
    </div>
    <div class="row" style="gap:var(--s-2);">
      <button id="btn-detail-copy" class="btn btn-primary">Copy</button>
      <button id="btn-detail-qr"   class="btn btn-secondary">QR</button>
      <button id="btn-detail-del"  class="btn btn-danger">Delete</button>
    </div>
  </div>
</div>

<!-- ====== VIEW: ADD ====== -->
<div id="view-add" class="view">
  <div class="app-header tray-header">
    <button id="btn-add-back" class="btn btn-ghost" style="padding:4px 8px;">←</button>
    <span class="tray-header-title">Add account</span>
  </div>
  <div style="flex:1;padding:var(--s-4);overflow-y:auto;">
    <div id="drop-zone" class="drop-zone" style="margin-bottom:var(--s-4);">
      <svg width="32" height="32" style="color:var(--brand);margin-bottom:var(--s-2)" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
      </svg>
      <p style="font-size:13px;margin-bottom:var(--s-2);">Drop a QR code here</p>
      <button id="btn-scan-screen" class="btn btn-ghost" style="font-size:12px;">📷 Scan screen</button>
    </div>
    <p style="font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);margin-bottom:var(--s-2);">Or paste URI</p>
    <input id="input-uri" class="input" placeholder="otpauth://totp/…" style="margin-bottom:var(--s-3);font-size:12px;">
    <button id="btn-add-submit" class="btn btn-primary" style="width:100%;">Add account</button>
    <p id="add-error" style="font-family:var(--font-mono);font-size:11px;color:var(--danger);margin-top:var(--s-2);display:none;" role="alert"></p>
  </div>
</div>

<script src="js/otp.js"></script>
<script src="js/app.js"></script>
</body>
</html>
