<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TOFA</title>
  <link rel="stylesheet" href="assets/css/tokens.css">
  <link rel="stylesheet" href="assets/css/styles.css">
  <link rel="stylesheet" href="assets/css/app.css">
</head>
<body>

<script src="js/sprite.js"></script>

<!-- Loader bar -->
<div id="loader-bar"><div id="loader-bar-inner"></div></div>

<!-- Blocking overlay (unlock, scan, import, delete, etc.) -->
<div id="blocking-overlay" class="blocking-overlay" role="status" aria-live="polite">
  <div class="blocking-card">
    <div class="spinner" aria-hidden="true"></div>
    <div id="blocking-overlay-message" class="blocking-message">Working…</div>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="toast" role="alert" aria-live="polite"></div>

<!-- ====== VIEW: LOCKED ====== -->
<div id="view-locked" class="view active">
  <div class="app-header tray-header">
    <svg id="logo-header-locked" class="logo-svg" width="32" height="32" style="color: var(--brand)"><use href="#tofa-wink"/></svg>
    <span class="tray-header-title" style="flex:1;text-align:center;">TOFA</span>
    <button id="btn-settings-locked" class="btn btn-ghost" style="padding:4px 8px;" title="Settings">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
      </svg>
    </button>
  </div>
  <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:var(--s-6);">
    <svg id="logo-hero" class="logo-svg" width="80" height="80" style="color:var(--brand);margin-bottom:var(--s-2)"><use href="#tofa-wink"/></svg>
    <p style="font-size:11px;color:var(--text-muted);margin-bottom:var(--s-4);font-style:italic;">Leave your phone in your pocket</p>
    <p style="font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:0.2em;color:var(--text-muted);margin-bottom:var(--s-5);">VAULT LOCKED</p>
    <form id="form-unlock" style="width:280px;">
      <label class="input-label" for="input-passphrase">Passphrase</label>
      <input id="input-passphrase" class="input" type="password" autocomplete="current-password" autofocus style="margin-bottom:var(--s-3);">
      <div id="confirm-wrap" style="display:none;margin-bottom:var(--s-3);">
        <label class="input-label" for="input-passphrase-confirm">Confirm passphrase</label>
        <input id="input-passphrase-confirm" class="input" type="password" autocomplete="new-password">
        <p style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);margin-top:var(--s-1);">Remember it — it cannot be recovered.</p>
      </div>
      <p id="unlock-error" style="font-family:var(--font-mono);font-size:11px;color:var(--danger);margin-bottom:var(--s-2);visibility:hidden;min-height:1.4em;" role="alert"></p>
      <button type="submit" class="btn btn-primary" style="width:100%;" id="btn-unlock-submit">Unlock</button>
    </form>
  </div>
</div>

<!-- ====== VIEW: LIST ====== -->
<div id="view-list" class="view">
  <div class="app-header tray-header">
    <svg id="logo-header-list" class="logo-svg" width="32" height="32" style="color: var(--brand)"><use href="#tofa-wink"/></svg>
    <span class="tray-header-title">TOFA</span>
    <button id="btn-add" style="margin-left:auto;" class="btn btn-ghost" style="padding:4px 8px;font-size:18px;line-height:1;" title="Add account (⌘N)">+</button>
    <button id="btn-settings" class="btn btn-ghost" style="padding:4px 8px;" title="Settings">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
      </svg>
    </button>
    <button id="btn-lock" class="btn btn-ghost" style="padding:4px 8px;" title="Lock vault">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 018 0v4"/>
      </svg>
    </button>
  </div>
  <div style="padding:var(--s-2) var(--s-3) 0;">
    <input id="search-input" class="input" placeholder="Search accounts… ⌘K" style="font-size:12px;padding:7px 12px;">
  </div>
  <div class="otp-progress" style="margin:var(--s-2) var(--s-3) 0;">
    <div class="otp-progress-bar" id="global-progress-bar"></div>
  </div>
  <div class="account-list" id="account-list"></div>
</div>

<!-- ====== VIEW: DETAIL ====== -->
<div id="view-detail" class="view">
  <div class="app-header tray-header">
    <button id="btn-detail-back" class="btn btn-ghost" style="padding:4px 8px;">←</button>
    <span id="detail-title" class="tray-header-title"></span>
  </div>
  <div style="flex:1;overflow-y:auto;padding:var(--s-4);display:flex;flex-direction:column;align-items:center;">
    <div id="detail-icon" class="account-icon" style="width:52px;height:52px;font-size:22px;margin-bottom:var(--s-3);"></div>
    <div class="detail-code" id="detail-code"></div>
    <div style="text-align:right;width:100%;font-family:var(--font-mono);font-size:10px;color:var(--text-muted);padding:var(--s-1) 0;" id="detail-seconds"></div>
    <div class="otp-progress" style="width:100%;margin-bottom:var(--s-4);">
      <div class="otp-progress-bar" id="detail-progress-bar"></div>
    </div>
    <div class="row" style="gap:var(--s-2);margin-bottom:var(--s-5);">
      <button id="btn-detail-copy" class="btn btn-primary">Copy</button>
      <button id="btn-detail-qr"   class="btn btn-secondary">QR</button>
      <button id="btn-detail-del"  class="btn btn-danger">Delete</button>
    </div>

    <!-- Metadata table -->
    <table id="detail-meta" style="width:100%;border-collapse:collapse;font-size:12px;">
      <tbody id="detail-meta-body"></tbody>
    </table>
  </div>

  <!-- Reveal secret overlay -->
  <div id="reveal-overlay" style="display:none;position:absolute;inset:0;background:var(--bg);z-index:10;display:none;flex-direction:column;align-items:center;justify-content:center;padding:var(--s-5);">
    <p style="font-family:var(--font-mono);font-size:11px;color:var(--text-muted);margin-bottom:var(--s-4);text-align:center;">Enter your passphrase to reveal the secret</p>
    <input id="reveal-passphrase" class="input" type="password" placeholder="Passphrase" style="margin-bottom:var(--s-3);width:100%;">
    <div style="display:flex;gap:var(--s-2);width:100%;">
      <button id="btn-reveal-cancel" class="btn btn-secondary" style="flex:1;">Cancel</button>
      <button id="btn-reveal-confirm" class="btn btn-primary" style="flex:1;">Reveal</button>
    </div>
    <p id="reveal-error" style="font-family:var(--font-mono);font-size:11px;color:var(--danger);margin-top:var(--s-2);display:none;"></p>
  </div>
</div>


<!-- ====== VIEW: ADD ====== -->
<div id="view-add" class="view">
  <div class="app-header tray-header">
    <button id="btn-add-back" class="btn btn-ghost" style="padding:4px 8px;">←</button>
    <span class="tray-header-title">Add account</span>
  </div>
  <div id="view-add-content" style="flex:1;padding:var(--s-4);overflow-y:auto;">
    <div style="display:flex;flex-direction:column;gap:var(--s-2);margin-bottom:var(--s-4);">
      <button id="btn-open-file" class="btn btn-secondary" style="width:100%;display:flex;align-items:center;gap:var(--s-3);padding:var(--s-3) var(--s-4);font-size:13px;">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Open QR image…
      </button>
      <button id="btn-scan-screen" class="btn btn-secondary" style="width:100%;display:flex;align-items:center;gap:var(--s-3);padding:var(--s-3) var(--s-4);font-size:13px;">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
        Scan screen
      </button>
      <button id="btn-scan-camera" class="btn btn-secondary" style="width:100%;display:flex;align-items:center;gap:var(--s-3);padding:var(--s-3) var(--s-4);font-size:13px;">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
        Camera
      </button>
    </div>
    <p style="font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);margin-bottom:var(--s-2);">Or paste URI</p>
    <input id="input-uri" class="input" placeholder="otpauth://totp/…" style="margin-bottom:var(--s-3);font-size:12px;">
    <button id="btn-add-submit" class="btn btn-primary" style="width:100%;">Add account</button>
    <p id="add-error" style="font-family:var(--font-mono);font-size:11px;color:var(--danger);margin-top:var(--s-2);display:none;" role="alert"></p>
  </div>
</div>

<script src="js/otp.js"></script>
<script src="js/issuer-icons.js"></script>
<script src="js/app.js"></script>
</body>
</html>
