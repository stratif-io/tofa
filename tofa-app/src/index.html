<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>tofa</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Locked view -->
  <div id="view-locked" class="view">
    <div class="header">
      <span class="app-name">tofa</span>
      <button id="btn-settings-locked" class="icon-btn" title="Settings">⚙</button>
    </div>
    <div class="content">
      <form id="form-unlock">
        <label for="input-passphrase">Passphrase</label>
        <input id="input-passphrase" type="password" autocomplete="current-password" autofocus>
        <p id="unlock-error" class="error hidden"></p>
        <button type="submit">Unlock</button>
      </form>
    </div>
  </div>

  <!-- Unlocked view -->
  <div id="view-unlocked" class="view hidden">
    <div class="header">
      <span class="app-name">tofa</span>
      <div class="header-actions">
        <button id="btn-scan-screen" class="icon-btn" title="Scan screen for QR code">🖥</button>
        <button id="btn-scan-camera" class="icon-btn" title="Scan QR code with camera">📷</button>
        <button id="btn-settings" class="icon-btn" title="Settings">⚙</button>
      </div>
    </div>
    <div id="otp-list" class="otp-list"></div>
  </div>

  <!-- Camera scan view -->
  <div id="view-camera" class="view hidden">
    <div class="header">
      <button id="btn-camera-back" class="icon-btn" title="Back">←</button>
      <span class="app-name">Scan QR</span>
    </div>
    <div class="camera-container">
      <div class="cam-wrap">
        <video id="camera-video" autoplay playsinline muted></video>
        <div class="cam-overlay">
          <div class="cam-finder"><span></span><div class="cam-scanline"></div></div>
        </div>
      </div>
      <p id="camera-status" class="dim">Starting camera…</p>
    </div>
  </div>

  <!-- OTP detail modal -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div id="modal-detail" class="modal-detail">
      <div class="modal-header">
        <div id="modal-name">
          <span id="modal-issuer"></span>
          <span id="modal-account"></span>
        </div>
        <button id="modal-close" class="icon-btn">✕</button>
      </div>
      <div class="modal-body">
        <div class="modal-code-row">
          <span id="modal-code" class="modal-code"></span>
          <button id="modal-copy" class="icon-btn" title="Copy">⧉</button>
        </div>
        <div class="modal-bar-wrap"><div id="modal-bar" class="otp-bar"></div></div>
        <div class="modal-meta">
          <span class="tt-row" id="md-issuer-row"><span class="tt-label">Issuer</span><span id="md-issuer"></span></span>
          <span class="tt-row" id="md-account-row"><span class="tt-label">Account</span><span id="md-account"></span></span>
          <span class="tt-row"><span class="tt-label">Algorithm</span><span id="md-algorithm"></span></span>
          <span class="tt-row"><span class="tt-label">Digits</span><span id="md-digits"></span></span>
          <span class="tt-row"><span class="tt-label">Period</span><span id="md-period"></span></span>
          <span class="tt-row"><span class="tt-label">Added</span><span id="md-created"></span></span>
        </div>
        <button id="modal-delete" class="tt-delete" style="align-self:flex-start">Delete</button>
      </div>
    </div>
  </div>

  <!-- Add entry confirmation view -->
  <div id="view-add-confirm" class="view hidden">
    <div class="header">
      <button id="btn-add-back" class="icon-btn" title="Back">←</button>
      <span class="app-name">Add Entry</span>
    </div>
    <div class="content">
      <p id="add-confirm-info" class="dim"></p>
      <label for="input-entry-name">Name</label>
      <input id="input-entry-name" type="text" spellcheck="false">
      <p id="add-error" class="error hidden"></p>
      <button id="btn-add-confirm">Add</button>
    </div>
  </div>

  <!-- Settings view -->
  <div id="view-settings" class="view hidden">
    <div class="header">
      <button id="btn-back" class="icon-btn" title="Back">←</button>
      <span class="app-name">Settings</span>
    </div>
    <div class="content">
      <form id="form-settings">
        <label for="input-vault-path">Vault path</label>
        <input id="input-vault-path" type="text" spellcheck="false">
        <p id="settings-error" class="error hidden"></p>
        <button type="submit">Save</button>
      </form>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
